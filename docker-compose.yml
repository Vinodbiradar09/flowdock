services:
  db:
    image: postgres:16
    container_name: flowdock-db
    restart: always
    environment:
      POSTGRES_USER: flowdock
      POSTGRES_PASSWORD: flowdock
      POSTGRES_DB: flowdock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowdock -d flowdock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: flowdock-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
