services:
  db:
    image: postgres:16
    container_name: flowdock-db
    restart: always
    environment:
      POSTGRES_USER: flowdock
      POSTGRES_PASSWORD: flowdock
      POSTGRES_DB: flowdock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: flowdock-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:
